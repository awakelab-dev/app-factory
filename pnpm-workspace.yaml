packages:
  - 'apps/*'
  - 'packages/*'

# pnpm 11: los scripts de build de dependencias requieren aprobación explícita.
allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  core-js: false
  esbuild: true
  prisma: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - eslint@10.7.0
