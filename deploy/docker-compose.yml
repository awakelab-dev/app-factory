# Compose de despliegue de la plataforma (apps/api + apps/web), compartido
# entre los proyectos `staging` y `production` en el mismo Lightsail de 32 GB
# (D-003, D-015). Sin secretos aquí: todo viene del .env del compose project
# (fuera del repo, en /opt/awkfactory/<entorno>/.env en el server).
#
# Uso en el server (nunca en local):
#   cd /opt/awkfactory/staging     # o /opt/awkfactory/production
#   docker compose --env-file .env -p awk-staging pull   # o awk-production
#   docker compose --env-file .env -p awk-staging up -d
#
# El Nginx nativo del host (no este compose) enruta:
#   https://<dominio>/api  -> 127.0.0.1:${API_PORT_HOST}  (contenedor api, NestJS en :3000)
#   https://<dominio>/     -> 127.0.0.1:${WEB_PORT_HOST}   (contenedor web, nginx:alpine estático)
#
# IMAGE_TAG por defecto "latest" (staging sigue main); producción se
# promueve fijando IMAGE_TAG=<sha> en su .env (re-tag = D-003 arquitectura).

services:
  api:
    image: ghcr.io/awakelab-dev/awkplatform-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      # Módulo moodle-insights (D-022): opcionales — sin ellas el módulo
      # muestra el replicado vacío y el sync devuelve 503, sin tumbar la API.
      MOODLE_URL: ${MOODLE_URL:-}
      MOODLE_TOKEN: ${MOODLE_TOKEN:-}
      # Timeout (ms) por llamada a Moodle WS, default 60000 en el código si se
      # omite. Subir en instancias grandes (validado 2026-07-13, ver STATUS.md).
      MOODLE_REQUEST_TIMEOUT_MS: ${MOODLE_REQUEST_TIMEOUT_MS:-}
      # Módulo orientador-ia (D-024/D-025): opcional — sin ANTHROPIC_API_KEY
      # el análisis de perfil devuelve 503, el resto del módulo funciona igual.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
    ports:
      - '127.0.0.1:${API_PORT_HOST}:3000'
    healthcheck:
      # 127.0.0.1 explícito por la misma razón que el healthcheck de web
      # (ver comentario abajo): evita depender de cómo resuelva "localhost".
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/api/hello || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  # Control plane de la Fábrica (apps/factory, D-030): solo HTTP de lectura +
  # decisión de gates. Los runners de análisis/generación NO corren aquí (van
  # por CLI con PLATFORM_REPO_PATH, D-029) — por eso no recibe ANTHROPIC_*.
  # JWT_SECRET es el MISMO de la Plataforma: la Fábrica valida los tokens que
  # emite apps/api, no emite propios (D-030).
  factory:
    image: ghcr.io/awakelab-dev/awkplatform-factory:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      FACTORY_PORT: 3100
      FACTORY_DATABASE_URL: ${FACTORY_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - '127.0.0.1:${FACTORY_PORT_HOST}:3100'
    healthcheck:
      # /factory-api/health es el único endpoint sin JWT (ver HealthController).
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3100/factory-api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/awakelab-dev/awkplatform-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '127.0.0.1:${WEB_PORT_HOST}:80'
    healthcheck:
      # 127.0.0.1 explícito, no "localhost": musl (Alpine) resuelve
      # "localhost" a ::1 primero y nginx aquí solo escucha IPv4 (el
      # entrypoint no añade "listen [::]:80" porque nuestro default.conf
      # difiere del template empaquetado) -> "connection refused" con
      # "localhost" aunque nginx esté sano.
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
