# Server block para apps.awakelab.world — no toca los
# sitios existentes del host (docs/03-arquitectura.md). Copiar a
# /etc/nginx/sites-available/apps.awakelab.world en el server y
# symlink en sites-enabled (ver docs/runbooks/lightsail-deploy.md y, para el
# cutover del dominio anterior, docs/runbooks/migracion-dominio-2026-07.md).
#
# Solo HTTP aquí: `certbot --nginx -d apps.awakelab.world` añade
# el bloque 443 + redirect 80->443 automáticamente la primera vez.
#
# Puertos del compose de production (deploy/production.env.example):
#   api -> 127.0.0.1:18102   web -> 127.0.0.1:18103

server {
    listen 80;
    server_name apps.awakelab.world;

    location /api/ {
        proxy_pass http://127.0.0.1:18102/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # POST /api/moodle-insights/sync corre síncrono dentro de la misma
        # request y en una instancia Moodle grande (cientos de cursos) puede
        # tardar varios minutos — el default de Nginx (60s) la cortaría antes
        # de que termine. Validado 2026-07-13, ver docs/STATUS.md.
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:18103;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
