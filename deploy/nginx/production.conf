# Server block NUEVO para production.factory.wiloxagency.com — no toca los
# sitios existentes del host (docs/03-arquitectura.md). Copiar a
# /etc/nginx/sites-available/production.factory.wiloxagency.com en el server y
# symlink en sites-enabled (ver docs/runbooks/lightsail-deploy.md).
#
# Solo HTTP aquí: `certbot --nginx -d production.factory.wiloxagency.com` añade
# el bloque 443 + redirect 80->443 automáticamente la primera vez.
#
# Puertos del compose de production (deploy/production.env.example):
#   api -> 127.0.0.1:18102   web -> 127.0.0.1:18103

server {
    listen 80;
    server_name production.factory.wiloxagency.com;

    location /api/ {
        proxy_pass http://127.0.0.1:18102/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:18103;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
