# Server block para staging.apps.awakelab.world — no toca los
# sitios existentes del host (docs/03-arquitectura.md). Copiar a
# /etc/nginx/sites-available/staging.apps.awakelab.world en el server y
# symlink en sites-enabled (ver docs/runbooks/lightsail-deploy.md y, para el
# cutover del dominio anterior, docs/runbooks/migracion-dominio-2026-07.md).
#
# Solo HTTP aquí: `certbot --nginx -d staging.apps.awakelab.world` añade
# el bloque 443 + redirect 80->443 automáticamente la primera vez.
#
# Puertos del compose de staging (deploy/staging.env.example):
#   api -> 127.0.0.1:18100   web -> 127.0.0.1:18101   factory -> 127.0.0.1:18104

server {
    listen 80;
    server_name staging.apps.awakelab.world;

    location /api/ {
        proxy_pass http://127.0.0.1:18100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # proxy_read_timeout normal (60s). Antes estaba en 300s porque el
        # POST /api/moodle-insights/sync se creía un proceso de varios minutos;
        # en la práctica responde casi al toque, así que 60s sobra. Ver
        # docs/STATUS.md (limpieza post-Fase-1, 2026-07-17).
        proxy_read_timeout 60s;
    }

    # Control plane de la Fábrica (apps/factory, D-030). RECORDATORIO: este
    # bloque se añade al .conf del server EDITANDO A MANO (nano), nunca con
    # scp del archivo completo — certbot inyecta el bloque 443 en vivo y un
    # scp lo pisa (incidente documentado en docs/runbooks/lightsail-deploy.md).
    location /factory-api/ {
        proxy_pass http://127.0.0.1:18104/factory-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:18101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
