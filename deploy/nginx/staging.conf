# Server block NUEVO para staging.factory.wiloxagency.com — no toca los
# sitios existentes del host (docs/03-arquitectura.md). Copiar a
# /etc/nginx/sites-available/staging.factory.wiloxagency.com en el server y
# symlink en sites-enabled (ver docs/runbooks/lightsail-deploy.md).
#
# Solo HTTP aquí: `certbot --nginx -d staging.factory.wiloxagency.com` añade
# el bloque 443 + redirect 80->443 automáticamente la primera vez.
#
# Puertos del compose de staging (deploy/staging.env.example):
#   api -> 127.0.0.1:18100   web -> 127.0.0.1:18101

server {
    listen 80;
    server_name staging.factory.wiloxagency.com;

    location /api/ {
        proxy_pass http://127.0.0.1:18100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:18101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
